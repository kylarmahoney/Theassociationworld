openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: contact
    description: Contact form submissions
  - name: booking
    description: Booking form submissions
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /contact:
    post:
      operationId: submitContact
      tags: [contact]
      summary: Submit contact form
      description: Sends a contact inquiry email to management
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactSubmission"
      responses:
        "200":
          description: Submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmissionResult"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /booking:
    post:
      operationId: submitBooking
      tags: [booking]
      summary: Submit booking request
      description: Sends a booking request email to management
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingSubmission"
      responses:
        "200":
          description: Submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmissionResult"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ContactSubmission:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        email:
          type: string
          format: email
          maxLength: 200
        subject:
          type: string
          minLength: 1
          maxLength: 200
        message:
          type: string
          minLength: 1
          maxLength: 5000
      required:
        - name
        - email
        - subject
        - message
    BookingSubmission:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        email:
          type: string
          format: email
          maxLength: 200
        phone:
          type: string
          maxLength: 50
        eventType:
          type: string
          minLength: 1
          maxLength: 100
        eventDate:
          type: string
          maxLength: 100
        duration:
          type: string
          minLength: 1
          maxLength: 100
        city:
          type: string
          minLength: 1
          maxLength: 120
        country:
          type: string
          minLength: 1
          maxLength: 120
        venueName:
          type: string
          minLength: 1
          maxLength: 200
        venueDirections:
          type: string
          maxLength: 1000
        artist:
          type: string
          minLength: 1
          maxLength: 100
        budget:
          type: string
          maxLength: 100
        downPayment:
          type: string
          minLength: 1
          maxLength: 100
        details:
          type: string
          maxLength: 5000
        waiverAccepted:
          type: boolean
          enum: [true]
      required:
        - name
        - email
        - eventType
        - eventDate
        - duration
        - city
        - country
        - venueName
        - artist
        - downPayment
        - waiverAccepted
    SubmissionResult:
      type: object
      properties:
        ok:
          type: boolean
      required:
        - ok
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
